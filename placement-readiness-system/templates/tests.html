<!DOCTYPE html>
<html>

<head>

<title>Test Links</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body id="body">

<nav class="navbar px-4 d-flex justify-content-between">

<h4>📝 Test Practice</h4>

<div>
<button onclick="toggleMode()" class="btn btn-outline-dark btn-sm">🌙</button>
<a href="/dashboard" class="btn btn-outline-dark btn-sm">Back</a>
</div>

</nav>

<div class="container mt-4">

<div class="card p-4">

<h4>Practice Tests</h4>

<ul>

<li>
Aptitude Test →
<a href="https://www.indiabix.com/aptitude/" target="_blank">Start</a>
</li>

<li>
Coding Practice →
<a href="https://leetcode.com/" target="_blank">Start</a>
</li>

<li>
Technical MCQs →
<a href="https://www.geeksforgeeks.org/quiz-corner-gq/" target="_blank">Start</a>
</li>

<li>
Communication Skills →
<a href="https://www.efset.org/" target="_blank">Start</a>
</li>

</ul>

<p class="mt-3 text-muted">
After completing tests, return and enter your scores.
</p>

</div>

</div>

<script>
window.onload = function() {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
}

function toggleMode() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}
</script>

</body>
</html>
