<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    height: 100vh;
    background: linear-gradient(135deg, #43cea2, #185a9d);
    display: flex;
    justify-content: center;
    align-items: center;
    animation: fadeIn 1s ease-in;
}

.card {
    border-radius: 20px;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.15);
    color: white;
    width: 350px;
    padding: 30px;
    animation: slideUp 0.8s ease;
}

input {
    border-radius: 10px !important;
}

.btn {
    border-radius: 10px;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideUp {
    from {transform: translateY(40px); opacity: 0;}
    to {transform: translateY(0); opacity: 1;}
}

</style>

</head>

<body>

<button onclick="toggleMode()" style="position:absolute; top:20px; right:20px;" class="btn btn-light">
🌙
</button>

<div class="card text-center">

<h2>🚀 PlacePrep</h2>
<p>Smart Placement Preparation</p>

<form method="POST">

<input type="email" name="email" class="form-control mt-3" placeholder="Email" required>

<input type="password" name="password" class="form-control mt-3" placeholder="Password" required>

<button class="btn btn-light w-100 mt-4">Login</button>

</form>

<p class="mt-3">
Don't have an account? <a href="/register" style="color:#ffd;">Register</a>
</p>

</div>

<script>
function toggleMode() {
    document.body.classList.toggle("bg-dark");
    document.body.classList.toggle("text-white");
}
</script>

</body>
</html>
