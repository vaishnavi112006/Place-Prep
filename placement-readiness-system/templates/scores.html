<!DOCTYPE html>
<html>

<head>

<title>Enter Scores</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f7fb;
}
</style>

</head>

<body id="body">

<!-- Navbar -->
<nav class="navbar px-4 d-flex justify-content-between">

<h4>🚀 PlacePrep</h4>

<div>
<button onclick="toggleMode()" class="btn btn-outline-dark btn-sm">🌙</button>
<a href="/dashboard" class="btn btn-outline-dark btn-sm">Back</a>
</div>

</nav>

<div class="container mt-5">

<div class="card mx-auto" style="max-width: 500px;">

<h3 class="text-center">Enter Your Scores</h3>

<form method="POST">

<input type="number" name="aptitude" class="form-control mt-3" placeholder="Aptitude Score" required>

<input type="number" name="coding" class="form-control mt-3" placeholder="Coding Score" required>

<input type="number" name="technical" class="form-control mt-3" placeholder="Technical Score" required>

<input type="number" name="communication" class="form-control mt-3" placeholder="Communication Score" required>

<button class="btn btn-primary w-100 mt-4">Submit</button>

</form>

</div>

</div>

<script>

// Apply saved theme
window.onload = function() {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
}

// Toggle dark mode
function toggleMode() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

</script>

</body>
</html>
