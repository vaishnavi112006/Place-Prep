<!DOCTYPE html>
<html>

<head>

<title>Progress</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body id="body">

<!-- Navbar -->
<nav class="navbar px-4 d-flex justify-content-between">

<h4>🚀 PlacePrep</h4>

<div>
<button onclick="toggleMode()" class="btn btn-outline-dark btn-sm">🌙</button>
<a href="/dashboard" class="btn btn-outline-dark btn-sm">Back</a>
</div>

</nav>

<div class="container mt-4">

<!-- Table -->
<div class="card">

<h4 class="mb-3">Your Score History</h4>

<table class="table table-striped">

<tr>
<th>Date</th>
<th>Aptitude</th>
<th>Coding</th>
<th>Technical</th>
<th>Communication</th>
</tr>

{% for row in data %}

<tr>
<td>{{row[4]}}</td>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
</tr>

{% endfor %}

</table>

</div>

<!-- Chart -->
<div class="card mt-4">

<h4 class="mb-3">Performance Chart</h4>

<canvas id="progressChart"></canvas>

</div>

</div>

<script>

// Apply saved theme
window.onload = function() {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
}

// Toggle dark mode
function toggleMode() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

// Chart Data
let aptitude = [];
let coding = [];
let technical = [];
let communication = [];

{% for row in data %}
aptitude.push({{row[0]}});
coding.push({{row[1]}});
technical.push({{row[2]}});
communication.push({{row[3]}});
{% endfor %}

// Chart
new Chart(document.getElementById("progressChart"), {
type: 'line',
data: {
labels: aptitude.map((_, i) => "Test " + (i+1)),
datasets: [
{ label: "Aptitude", data: aptitude },
{ label: "Coding", data: coding },
{ label: "Technical", data: technical },
{ label: "Communication", data: communication }
]
},
options: {
responsive: true,
plugins: {
legend: { position: 'top' }
}
}
});

</script>

</body>
</html>
