<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body id="body">

<!-- Navbar -->
<nav class="navbar px-4 d-flex justify-content-between">

<h4>⚙️ Admin Panel</h4>

<div>
<button onclick="toggleMode()" class="btn btn-outline-dark btn-sm">🌙</button>
<a href="/dashboard" class="btn btn-outline-dark btn-sm">Back</a>
</div>

</nav>

<div class="container mt-4">

<!-- Form -->
<div class="card mx-auto" style="max-width: 500px;">

<h4 class="text-center">Add Company</h4>

<form method="POST">

<input type="text" name="company" class="form-control mt-3" placeholder="Company Name" required>

<input type="number" name="aptitude" class="form-control mt-3" placeholder="Aptitude Requirement">

<input type="number" name="coding" class="form-control mt-3" placeholder="Coding Requirement">

<input type="number" name="technical" class="form-control mt-3" placeholder="Technical Requirement">

<input type="number" name="communication" class="form-control mt-3" placeholder="Communication Requirement">

<button class="btn btn-dark w-100 mt-4">Add Company</button>

</form>

</div>

<!-- Company Table -->
<div class="card mt-4">

<h4 class="mb-3">📋 Company List</h4>

<table class="table table-striped">

<tr>
<th>Company</th>
<th>Aptitude</th>
<th>Coding</th>
<th>Technical</th>
<th>Communication</th>
</tr>

{% for c in companies %}

<tr>
<td>{{c[1]}}</td>
<td>{{c[2]}}</td>
<td>{{c[3]}}</td>
<td>{{c[4]}}</td>
<td>{{c[5]}}</td>
</tr>

{% endfor %}

</table>

</div>

</div>

<script>

// Apply saved theme
window.onload = function() {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
}

// Toggle dark mode
function toggleMode() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

</script>

</body>
</html>
